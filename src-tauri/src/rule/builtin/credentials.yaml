# Credential-access rules — high signal, low false-positive.
# Patterns use `~/` which the engine expands to `/Users/*/` so they match
# across all user homes.

rules:
  - id: ssh-private-key-read
    type: file
    severity: high
    # Match any *_ed25519 / *_rsa / id_* private-key style filename in ~/.ssh/
    # plus the catch-all for anything that smells like a private key file.
    pattern: "~/.ssh/*"
    action: read
    message: "读取 ~/.ssh/ 下的文件（可能含私钥）"

  - id: ssh-config-read
    type: file
    severity: medium
    pattern: "~/.ssh/config"
    action: read
    message: "读取 SSH 配置文件"

  - id: ssh-known-hosts-read
    type: file
    severity: low
    pattern: "~/.ssh/known_hosts"
    action: read
    message: "读取 SSH known_hosts"

  - id: aws-credentials-read
    type: file
    severity: high
    pattern: "~/.aws/credentials"
    action: read
    message: "读取 AWS access credentials"

  - id: aws-config-read
    type: file
    severity: medium
    pattern: "~/.aws/config"
    action: read
    message: "读取 AWS 配置（可能包含 profile + region）"

  - id: gnupg-keyring-read
    type: file
    severity: high
    pattern: "~/.gnupg/*.gpg"
    action: read
    message: "读取 GPG 密钥环"

  - id: netrc-read
    type: file
    severity: high
    pattern: "~/.netrc"
    action: read
    message: "读取 .netrc（HTTP/FTP 凭据）"

  - id: kube-config-read
    type: file
    severity: high
    pattern: "~/.kube/config"
    action: read
    message: "读取 kubeconfig（含 cluster 凭据）"

  - id: gh-cli-token-read
    type: file
    severity: high
    pattern: "~/.config/gh/hosts.yml"
    action: read
    message: "读取 GitHub CLI token"

  - id: docker-config-read
    type: file
    severity: medium
    pattern: "~/.docker/config.json"
    action: read
    message: "读取 Docker 配置（可能含 registry 凭据）"

  - id: chrome-login-data-read
    type: file
    severity: high
    pattern: "~/Library/Application Support/Google/Chrome/*/Login Data"
    action: read
    message: "读取 Chrome 浏览器密码数据库"

  - id: safari-keychain-read
    type: file
    severity: high
    pattern: "~/Library/Keychains/*"
    action: read
    message: "读取 macOS 钥匙串文件"

  - id: env-file-read
    type: file
    severity: medium
    pattern: "**/.env*"
    action: read
    message: "读取 .env 文件（常含 API key / 数据库凭据）"
